services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: farmwise
      POSTGRES_PASSWORD: farmwise_dev
      POSTGRES_DB: farmwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmwise -d farmwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
